name: pytest

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ '*' ]

jobs:
  ci:
    runs-on: ${{ matrix.info.os }}
    strategy:
      matrix:
        info:
          - os: ubuntu-22.04
            python: 3.9
            mysql: 8.0
            postgres: 14
          - os: ubuntu-22.04
            python: 3.13
            mysql: 8.4
            postgres: 18
          - os: windows-2022
            python: 3.13
            mysql: 8.0
            postgres: 14
    name: ${{matrix.info.os}} ${{ matrix.info.python }} ${{ matrix.info.mysql }} ${{ matrix.info.postgres }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      name: Setup Python ${{ matrix.info.python }}
      with:
        python-version: ${{ matrix.info.python }}
    
    - name: Fix MySQL APT key (Ubuntu only)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get -qq update
        sudo apt-get -qq install -y gnupg
        gpg --batch --keyserver hkps://keyserver.ubuntu.com --recv-keys B7B3B788A8D3785C
        gpg --batch --export B7B3B788A8D3785C | sudo tee /usr/share/keyrings/mysql-archive-keyring.gpg > /dev/null
        sudo apt-get -qq update
    
    - uses: ankane/setup-mysql@v1
      with:
        mysql-version: ${{ matrix.info.mysql }}

    - name: Setup PostgreSQL
      uses: ikalnytskyi/action-setup-postgres@v8
      with:
        postgres-version: "${{ matrix.info.postgres }}"
        username: postgres
        password: postgres
        database: postgres

    - name: Configure PostgreSQL env
      run: |
        echo "PGHOST=localhost" >> $GITHUB_ENV
        echo "PGPORT=5432" >> $GITHUB_ENV
        echo "PGUSER=postgres" >> $GITHUB_ENV
        echo "PGPASSWORD=postgres" >> $GITHUB_ENV

    - name: Test
      run: |
        python -m pip install --upgrade pip
        bash ./ci-test.sh
        bash ./ci-cov.sh
