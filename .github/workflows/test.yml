name: pytest

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ '*' ]

jobs:
  ci:
    runs-on: ${{ matrix.info.os }}
    strategy:
      matrix:
        info:
          - os: ubuntu-22.04
            python: 3.9
            mysql: 8.0
            postgres: 14
          - os: ubuntu-22.04
            python: 3.13
            mysql: 8.4
            postgres: 16
          - os: windows-2022
            python: 3.13
            mysql: 8.0
            postgres: 14
    name: ${{matrix.info.os}} ${{ matrix.info.python }} ${{ matrix.info.mysql }} ${{ matrix.info.postgres }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      name: Setup Python ${{ matrix.info.python }}
      with:
        python-version: ${{ matrix.info.python }}
    
    - name: Start MySQL (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        MYSQL_IMAGE="mysql:${{ matrix.info.mysql }}"
        docker run -d --name mysql \
          -e MYSQL_ALLOW_EMPTY_PASSWORD=yes \
          -e MYSQL_DATABASE=test \
          -p 3306:3306 \
          "${MYSQL_IMAGE}"

        for i in {1..60}; do
          if docker exec mysql mysqladmin ping -h 127.0.0.1 --silent; then
            exit 0
          fi
          sleep 2
        done
        docker logs mysql
        exit 1

    - name: Configure MySQL client (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        cat > ~/.my.cnf <<'EOF'
        [client]
        host=127.0.0.1
        port=3306
        user=root
        password=
        protocol=tcp
        EOF
        chmod 600 ~/.my.cnf

    - uses: ankane/setup-mysql@v1
      if: runner.os == 'Windows'
      with:
        mysql-version: ${{ matrix.info.mysql }}

    - name: Setup PostgreSQL
      uses: ikalnytskyi/action-setup-postgres@v8
      with:
        postgres-version: "${{ matrix.info.postgres }}"
        username: postgres
        password: postgres
        database: postgres

    - name: Configure PostgreSQL env
      run: |
        echo "PGHOST=localhost" >> $GITHUB_ENV
        echo "PGPORT=5432" >> $GITHUB_ENV
        echo "PGUSER=postgres" >> $GITHUB_ENV
        echo "PGPASSWORD=postgres" >> $GITHUB_ENV

    - name: Test
      run: |
        python -m pip install --upgrade pip
        bash ./ci-test.sh
        bash ./ci-cov.sh
